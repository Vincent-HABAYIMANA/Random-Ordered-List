<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Order List</title>

<style>
   
      
    body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Header */
h1 {
    margin-top: 40px;
    margin-bottom: 20px;
    font-size: 28px;
    letter-spacing: 1px;
}

/* Input area */
input {
    width: 60%;
    max-width: 500px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
    margin-bottom: 10px;
}

/* Buttons */
button {
    padding: 10px 16px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #38bdf8;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #0ea5e9;
    transform: scale(1.05);
}

/* Result box */
#result {
    margin-top: 20px;
    width: 90%;
    max-width: 500px;
    text-align: left;
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Each item */
.item {
    padding: 10px;
    margin: 6px 0;
    background: #334155;
    border-radius: 8px;
    transition: 0.2s;
}

.item:hover {
    background: #475569;
}

/* Footer */
footer {
    margin-top: auto;
    width: 100%;
    text-align: center;
    background: #020617;
    padding: 12px;
    font-size: 14px;
    color: #94a3b8;
}
</style>
</head>

<body>

<h1>Random Order List</h1>

<input id="inputBox" placeholder="Enter items (e.g. Ali, John, 10, 55)" />
<button onclick="generate()">Randomize</button>
<button onclick="clearList()">Clear</button>

<div id="result"></div>

<footer>
    Random Order List © 2026 | Vincent
</footer>

<script>
function generate() {
    const input = document.getElementById("inputBox").value;
    const result = document.getElementById("result");

    if (!input.trim()) return;

    let items = input.split(",").map(i => i.trim()).filter(i => i);

    // shuffle randomly
    items.sort(() => Math.random() - 0.7);

    result.innerHTML = "";

    items.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerText = `${index + 1}. ${item}`;
        result.appendChild(div);
    });
}

function clearList() {
    document.getElementById("inputBox").value = "";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
